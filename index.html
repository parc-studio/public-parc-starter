<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My App</title>

  <!-- Stylesheets — order matters -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- SECTION: header -->
  <header class="site-header">
    <h1 class="site-title">My App</h1>
    <p class="site-subtitle">A simple starter project</p>
  </header>
  <!-- /SECTION: header -->

  <!-- SECTION: main -->
  <main class="site-main">

    <!-- SECTION: counter -->
    <div class="card" id="counter-card">
      <h2 class="card-title">Counter</h2>
      <p class="counter-display" id="counter-display">0</p>
      <div class="card-actions">
        <button class="btn" data-action="decrement-counter">−</button>
        <button class="btn btn-primary" data-action="increment-counter">+</button>
        <button class="btn" data-action="reset-counter">Reset</button>
      </div>
    </div>
    <!-- /SECTION: counter -->

  </main>
  <!-- /SECTION: main -->

  <!-- SECTION: footer -->
  <footer class="site-footer">
    <p>Built with zero build tools.</p>
  </footer>
  <!-- /SECTION: footer -->

  <!-- Scripts — order matters: utils → state → dom → app -->
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
